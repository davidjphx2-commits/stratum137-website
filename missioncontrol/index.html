<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Mission Control — Stratum 137</title>
  <style>
    :root { --navy: #0d1117; --panel: #161b22; --teal: #14b8a6; --text: #e6edf3; --dim: #8a95a3; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--navy); color: var(--text); font-family: -apple-system, "Segoe UI", Arial, sans-serif; }
    header { text-align: center; padding: 40px 20px 24px; border-bottom: 1px solid #222b36; }
    header h1 { font-size: 1.6rem; letter-spacing: .04em; }
    header .mark { color: var(--teal); font-weight: 700; letter-spacing: .12em; font-size: .85rem; }
    header p { color: var(--dim); margin-top: 8px; font-size: .9rem; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
    figure { margin: 0 0 28px; }
    figure img { width: 100%; height: auto; display: block; border: 1px solid #222b36; border-radius: 10px; box-shadow: 0 6px 24px rgba(0,0,0,.4); }
    figcaption { color: var(--dim); font-size: .78rem; margin-top: 8px; text-align: right; }
    footer { text-align: center; color: var(--dim); font-size: .75rem; padding: 24px; border-top: 1px solid #222b36; }
    #gate { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px; z-index: 50; }
    #gate .mark { color: var(--teal); font-weight: 700; letter-spacing: .12em; font-size: .85rem; }
    #gate input { background: var(--panel); border: 1px solid #2a3441; color: var(--text);
            padding: 12px 16px; border-radius: 8px; font-size: 1rem; width: 240px; text-align: center; }
    #gate button { background: var(--teal); color: #04211d; border: none; padding: 12px 28px;
            border-radius: 8px; font-weight: 700; font-size: .95rem; cursor: pointer; }
    #gate .err { color: #f87171; font-size: .8rem; min-height: 1em; }
    #content { display: none; }
  </style>
</head>
<body>
  <div id="gate">
    <div class="mark">STRATUM 137</div>
    <div style="color:var(--dim);font-size:.9rem;">Enter password to view</div>
    <input id="pw" type="password" placeholder="Password" autofocus>
    <button id="go">Enter</button>
    <div class="err" id="err"></div>
  </div>
  <div id="content">
  <header>
    <div class="mark">STRATUM 137</div>
    <h1>Mission Control</h1>
    <p>Agent OS dashboard — walkthrough</p>
  </header>
  <main>
    <figure><img src="img/01.png" alt="Mission Control 1" loading="lazy"><figcaption>1 / 15</figcaption></figure>
    <figure><img src="img/02.png" alt="Mission Control 2" loading="lazy"><figcaption>2 / 15</figcaption></figure>
    <figure><img src="img/03.png" alt="Mission Control 3" loading="lazy"><figcaption>3 / 15</figcaption></figure>
    <figure><img src="img/04.png" alt="Mission Control 4" loading="lazy"><figcaption>4 / 15</figcaption></figure>
    <figure><img src="img/05.png" alt="Mission Control 5" loading="lazy"><figcaption>5 / 15</figcaption></figure>
    <figure><img src="img/06.png" alt="Mission Control 6" loading="lazy"><figcaption>6 / 15</figcaption></figure>
    <figure><img src="img/07.png" alt="Mission Control 7" loading="lazy"><figcaption>7 / 15</figcaption></figure>
    <figure><img src="img/08.png" alt="Mission Control 8" loading="lazy"><figcaption>8 / 15</figcaption></figure>
    <figure><img src="img/09.png" alt="Mission Control 9" loading="lazy"><figcaption>9 / 15</figcaption></figure>
    <figure><img src="img/10.png" alt="Mission Control 10" loading="lazy"><figcaption>10 / 15</figcaption></figure>
    <figure><img src="img/11.png" alt="Mission Control 11" loading="lazy"><figcaption>11 / 15</figcaption></figure>
    <figure><img src="img/12.png" alt="Mission Control 12" loading="lazy"><figcaption>12 / 15</figcaption></figure>
    <figure><img src="img/13.png" alt="Mission Control 13" loading="lazy"><figcaption>13 / 15</figcaption></figure>
    <figure><img src="img/14.png" alt="Mission Control 14" loading="lazy"><figcaption>14 / 15</figcaption></figure>
    <figure><img src="img/15.png" alt="Mission Control 15" loading="lazy"><figcaption>15 / 15</figcaption></figure>
  </main>
  <footer>Stratum 137 · Confidential · unlisted</footer>
  </div>
  <script>
    (function () {
      var PW = 'jesus';
      var gate = document.getElementById('gate');
      var content = document.getElementById('content');
      var input = document.getElementById('pw');
      var err = document.getElementById('err');
      function unlock() { gate.style.display = 'none'; content.style.display = 'block'; try { sessionStorage.setItem('mc_ok', '1'); } catch (e) {} }
      function tryPw() {
        if (input.value.toLowerCase().trim() === PW) { unlock(); }
        else { err.textContent = 'Incorrect password.'; input.value = ''; input.focus(); }
      }
      if (sessionStorage.getItem('mc_ok') === '1') { unlock(); }
      document.getElementById('go').addEventListener('click', tryPw);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryPw(); });
    })();
  </script>
</body>
</html>
